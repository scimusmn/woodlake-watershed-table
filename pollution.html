    <script>

//let field = [ ...Array(64).keys() ].map(x => [ ...Array(64).keys() ].map(y => [y < 32 ? 10 : -10, x < 32 ? -10 : 10 ]));

const WIDTH = 32;
const HEIGHT = 32;
let field = [ ...Array(WIDTH).keys() ].map(x => [ ...Array(HEIGHT).keys() ].map(y => [0, 0]));
const CX = Math.floor(WIDTH/2);
const CY = Math.floor(HEIGHT/2);

function lerp(a, b, x) {
  return a*(1-x) + b*x;
}

function vlerp([ax, ay], [bx, by], t) {
  return [ lerp(ax, bx, t), lerp(ay, by, t) ];
}


function interpolate(field, x, y) {
  const [ fx, fy ] = [ Math.floor(x), Math.floor(y) ];
  const corners = [ [fx, fy], [fx+1, fy], [fx, fy+1], [fx+1, fy+1] ]
    .map(([cx, cy]) => (field[cx] ?? [])[cy] ?? [0, 0])

  const lo = vlerp(corners[0], corners[1], x-fx);
  const hi = vlerp(corners[2], corners[3], x-fx);
  return vlerp(lo, hi, y-fy);
}


function advect(field, s) {
  return field.map((col, x) => col.map(([vx, vy], y) => {
    let r = Math.sqrt(vx*vx + vy*vy);
    if (r == 0) {
      r = 1;
    }
    if (r !== r) {
      console.log(x, y, vx, vy);
      return [ 0, 0 ];
    }
    const [ ax, ay ] = interpolate(field, x-(vx/r), y-(vy/r));
    return [ (1-s)*vx + s*ax, (1-s)*vy + s*ay ];
  }));
}


function divGrad(field, x, y) {
  const v = [ -1, 0, 1 ].map(Y => [1, 0, -1].map(X => (field[x+X] ?? [])[y+Y] ?? [0,0])).flat();
  const X = v.map(([x, y]) => x);
  const Y = v.map(([x, y]) => y);

  return [
    X[0]-Y[0] - (2*X[1]) + X[2]+Y[2] +
    (2*X[3]) - (4*X[4]) + (2*X[5]) +
    X[6]+Y[6] - (2*X[7]) + X[8]-Y[8],

    -X[0]+Y[0] + (2*Y[1]) + X[2]+Y[2] +
    -(2*Y[3]) - (4*Y[4]) - (2*Y[5]) +
    X[6]+Y[6] + (2*Y[7]) - X[8]+Y[8]
  ];
}


function stripDiv(field, amt) {
  return field.map((col, x) => col.map(([vx, vy], y) => {
    const [gx, gy] = divGrad(field, x, y);
    return [vx + amt*gx, vy + amt*gy];
  }));
}


function Particle(x, y) {
  this.x = x;
  this.y = y;
  this.vx = Math.random();
  this.vy = Math.random();
}


Particle.prototype.update = function(field) {
  const dt = 0.1;
  const [ fx, fy ] = interpolate(field, this.x, this.y);
  this.vx = lerp(this.vx, fx, 0.1);
  this.vy = lerp(this.vy, fy, 0.1);
  this.x += dt * this.vx;
  this.y += dt * this.vy;
}


Particle.prototype.draw = function(ctx) {
  ctx.beginPath();
  ctx.arc(this.x, this.y, 0.2, 0, 2*Math.PI);
  ctx.fill();
}


window.onload = () => {
  const canvas = document.createElement('canvas');
  canvas.width = 1024;
  canvas.height = canvas.width;
  document.body.append(canvas);
  const ctx = canvas.getContext('2d');

  ctx.lineWidth = 0.09;
  const scale = 64;
  ctx.setTransform(1024/scale, 0, 0, 1024/scale, 0.5*1024/scale, 0.5*1024/scale);

  const drawVector = (x, y, vx, vy, head) => {
    if (vx == 0 && vy == 0) {
      return;
    }
    const [ tx, ty ] = [ x+vx, y+vy ];
    const angle = Math.atan2(vy, vx);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x+vx, y+vy);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(tx - 0.25*Math.cos(angle+1), ty - 0.25*Math.sin(angle+1));
    ctx.lineTo(tx, ty);
    ctx.lineTo(tx - 0.25*Math.cos(angle-1), ty - 0.25*Math.sin(angle-1));
    ctx.stroke();
    // ctx.arc(x+vx, y+vy, head, 0, 2*Math.PI);
    // ctx.fill();
  }

  const drawField = (field) => field.forEach((col, x) => col.forEach((v, y) => {
    drawVector(x, y, v[0], v[1], 0.1);
  }));

  drawField(field);

  ctx.strokeStyle = '#ff0000';
  ctx.fillStyle = '#ff0000';

  // const particles = [ ...Array(100) ].map(() => new Particle(64*Math.random(), 64*Math.random()));

  function next() {
    ctx.clearRect(-64, -64, 1024, 1024);
    field = advect(field, 0.8);
field[1][CY] = [ 8, 0 ];
field[1][CY+1] = [ 8, 0 ];
field[2][CY] = [ 8, 0 ];
field[2][CY+2] = [ 8, 0 ];

field[WIDTH-2][CY] = [ -8, 0 ];
field[WIDTH-2][CY+1] = [ -8, 0 ];
field[WIDTH-3][CY] = [ -8, 0 ];
field[WIDTH-3][CY+1] = [ -8, 0 ];


    // field[32][32] = [1, 1];
    // field[41][32] = [-1, -1];
    const n = 3;
    for (let i=0; i<n; i++) {
      field = stripDiv(field, 0.1);
    }
    // particles.forEach(p => p.update(field));
    drawField(field);
    // particles.forEach(p => p.draw(ctx));
    requestAnimationFrame(next);
  }
  requestAnimationFrame(next());
};
